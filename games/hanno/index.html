<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Survival Arena</title>
    <style>
      :root {
        --bg: #070b14;
        --panel: rgba(255, 255, 255, 0.08);
        --text: #e8f1ff;
        --accent: #39ffb6;
        --danger: #ff4d6d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at center, #10192f, var(--bg));
        color: var(--text);
        font-family: system-ui, sans-serif;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        inset: 12px auto auto 12px;
        padding: 12px 16px;
        border-radius: 18px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        font-weight: 700;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.65);
        text-align: center;
      }
      button {
        padding: 14px 24px;
        border: none;
        border-radius: 14px;
        background: var(--accent);
        font-weight: 800;
        cursor: pointer;
      }
      .small {
        opacity: 0.8;
        max-width: 600px;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      Score: <span id="score">0</span> | HP: <span id="hp">100</span> | Wave:
      <span id="wave">1</span>
    </div>
    <div id="overlay">
      <h1>⚡ Neon Survival Arena</h1>
      <p class="small">
        Move: WASD / Arrow keys • Dash: Shift • Shoot: Mouse • Survive
        escalating enemy waves, collect upgrades, and don't get cornered.
      </p>
      <button onclick="startGame()">Start</button>
    </div>
    <canvas id="game"></canvas>
    <script>
      const c = document.getElementById("game");
      const x = c.getContext("2d");
      let w,
        h,
        running = false,
        mouse = { x: 0, y: 0, down: false };
      function resize() {
        w = c.width = innerWidth;
        h = c.height = innerHeight;
      }
      addEventListener("resize", resize);
      resize();

      const keys = {};
      addEventListener("keydown", (e) => (keys[e.key.toLowerCase()] = true));
      addEventListener("keyup", (e) => (keys[e.key.toLowerCase()] = false));
      addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });
      addEventListener("mousedown", () => (mouse.down = true));
      addEventListener("mouseup", () => (mouse.down = false));

      let player, bullets, enemies, particles, pickups, score, wave, spawnTimer;
      function reset() {
        player = {
          x: w / 2,
          y: h / 2,
          r: 18,
          speed: 4,
          hp: 100,
          dash: 0,
          fireCd: 0,
        };
        bullets = [];
        enemies = [];
        particles = [];
        pickups = [];
        score = 0;
        wave = 1;
        spawnTimer = 0;
      }
      function startGame() {
        document.getElementById("overlay").style.display = "none";
        running = true;
        reset();
        loop();
      }

      function spawnEnemy() {
        const side = Math.floor(Math.random() * 4);
        let ex, ey;
        if (side === 0) {
          ex = -30;
          ey = Math.random() * h;
        } else if (side === 1) {
          ex = w + 30;
          ey = Math.random() * h;
        } else if (side === 2) {
          ex = Math.random() * w;
          ey = -30;
        } else {
          ex = Math.random() * w;
          ey = h + 30;
        }
        const type = Math.random();
        enemies.push({
          x: ex,
          y: ey,
          r: 12 + Math.random() * 18,
          hp: type > 0.8 ? 5 : 2,
          speed: 1 + Math.random() * wave * 0.15,
          color: type > 0.8 ? "#ff4d6d" : "#ffd166",
        });
      }

      function shoot() {
        if (player.fireCd > 0) return;
        const a = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        bullets.push({
          x: player.x,
          y: player.y,
          vx: Math.cos(a) * 9,
          vy: Math.sin(a) * 9,
          r: 5,
        });
        player.fireCd = 8;
      }

      function update() {
        let dx =
          (keys["d"] || keys["arrowright"] ? 1 : 0) -
          (keys["a"] || keys["arrowleft"] ? 1 : 0);
        let dy =
          (keys["s"] || keys["arrowdown"] ? 1 : 0) -
          (keys["w"] || keys["arrowup"] ? 1 : 0);
        const mag = Math.hypot(dx, dy) || 1;
        let sp = player.speed;
        if (keys["shift"] && player.dash <= 0) {
          sp = 10;
          player.dash = 60;
        }
        player.x = Math.max(
          player.r,
          Math.min(w - player.r, player.x + (dx / mag) * sp),
        );
        player.y = Math.max(
          player.r,
          Math.min(h - player.r, player.y + (dy / mag) * sp),
        );
        if (player.dash > 0) player.dash--;
        if (player.fireCd > 0) player.fireCd--;
        if (mouse.down) shoot();

        spawnTimer--;
        if (spawnTimer <= 0) {
          for (let i = 0; i < wave; i++) spawnEnemy();
          spawnTimer = Math.max(90 - wave * 3, 20);
        }
        if (score > wave * 25) wave++;

        bullets.forEach((b, i) => {
          b.x += b.vx;
          b.y += b.vy;
          if (b.x < 0 || b.x > w || b.y < 0 || b.y > h) bullets.splice(i, 1);
        });

        enemies.forEach((e, ei) => {
          const a = Math.atan2(player.y - e.y, player.x - e.x);
          e.x += Math.cos(a) * e.speed;
          e.y += Math.sin(a) * e.speed;
          if (Math.hypot(player.x - e.x, player.y - e.y) < player.r + e.r) {
            player.hp -= 0.25;
          }
          bullets.forEach((b, bi) => {
            if (Math.hypot(b.x - e.x, b.y - e.y) < e.r + b.r) {
              e.hp--;
              bullets.splice(bi, 1);
              for (let p = 0; p < 6; p++)
                particles.push({
                  x: e.x,
                  y: e.y,
                  vx: (Math.random() - 0.5) * 4,
                  vy: (Math.random() - 0.5) * 4,
                  l: 30,
                });
              if (e.hp <= 0) {
                enemies.splice(ei, 1);
                score++;
                if (Math.random() < 0.08)
                  pickups.push({ x: e.x, y: e.y, r: 10 });
              }
            }
          });
        });

        pickups.forEach((p, i) => {
          if (Math.hypot(player.x - p.x, player.y - p.y) < player.r + p.r) {
            player.hp = Math.min(100, player.hp + 15);
            score += 3;
            pickups.splice(i, 1);
          }
        });
        particles.forEach((p, i) => {
          p.x += p.vx;
          p.y += p.vy;
          p.l--;
          if (p.l <= 0) particles.splice(i, 1);
        });

        scoreEl.textContent = score;
        hpEl.textContent = Math.floor(player.hp);
        waveEl.textContent = wave;
        if (player.hp <= 0) {
          running = false;
          overlay.innerHTML = `<h1>Game Over</h1><p>Score: ${score}</p><button onclick='startGame()'>Retry</button>`;
          overlay.style.display = "flex";
        }
      }

      function drawGrid() {
        x.strokeStyle = "rgba(255,255,255,.04)";
        for (let i = 0; i < w; i += 40) {
          x.beginPath();
          x.moveTo(i, 0);
          x.lineTo(i, h);
          x.stroke();
        }
        for (let i = 0; i < h; i += 40) {
          x.beginPath();
          x.moveTo(0, i);
          x.lineTo(w, i);
          x.stroke();
        }
      }

      function draw() {
        x.clearRect(0, 0, w, h);
        drawGrid();
        x.fillStyle = "#39ffb6";
        x.beginPath();
        x.arc(player.x, player.y, player.r, 0, Math.PI * 2);
        x.fill();
        bullets.forEach((b) => {
          x.fillStyle = "#fff";
          x.beginPath();
          x.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          x.fill();
        });
        enemies.forEach((e) => {
          x.fillStyle = e.color;
          x.beginPath();
          x.arc(e.x, e.y, e.r, 0, Math.PI * 2);
          x.fill();
        });
        pickups.forEach((p) => {
          x.fillStyle = "#7afcff";
          x.beginPath();
          x.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          x.fill();
        });
        particles.forEach((p) => {
          x.fillStyle = "rgba(255,255,255," + p.l / 30 + ")";
          x.fillRect(p.x, p.y, 3, 3);
        });
      }

      const scoreEl = document.getElementById("score"),
        hpEl = document.getElementById("hp"),
        waveEl = document.getElementById("wave"),
        overlay = document.getElementById("overlay");
      function loop() {
        if (!running) return;
        update();
        draw();
        requestAnimationFrame(loop);
      }
    </script>
  </body>
</html>

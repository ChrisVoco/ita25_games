<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flag Guessing Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-container">
      <header class="game-header">
        <div class="title-area">
          <span class="icon">🌍</span>
          <h1>Flag Guessing Game</h1>
        </div>
        <div class="score-area">
          Score: <span id="score-current">0</span> /
          <span id="score-total">0</span>
        </div>
      </header>

      <div class="controls-area">
        <p>
          Choose the correct country for the flag. Level:
          <span id="current-level-text">easy</span>.
        </p>
        <div class="difficulty-selector">
          <label for="difficulty">Difficulty:</label>
          <select id="difficulty">
            <option value="easy">easy</option>
            <option value="tough">tough</option>
            <option value="hard">hard</option>
          </select>
        </div>
      </div>

      <div class="flag-area">
        <img id="flag-img" src="" alt="Country Flag" />
        <p class="question-text">Which country does this flag belong to?</p>
      </div>

      <div class="options-area" id="options-container"></div>

      <footer class="game-footer">
        <div id="feedback-message" class="feedback hidden">
          <span id="feedback-icon"></span>
          <span id="feedback-text"></span>
        </div>
        <button id="next-btn" class="next-btn hidden">Next flag</button>
      </footer>

      <div id="map-container" class="map-container hidden"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
